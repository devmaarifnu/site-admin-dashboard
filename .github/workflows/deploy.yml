name: Deploy Next.js

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Prepare Build
        run: |
          mkdir deploy
          cp -r .next/standalone deploy/
          cp -r .next/static deploy/standalone/.next/
          cp -r public deploy/standalone

      - name: Compress
        run: tar -czf deploy.tar.gz deploy

      - name: Upload Build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/var/opt/site-admin-dashboard"

      - name: Replace Build + Restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            cd /var/opt/site-admin-dashboard

            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "Replace standalone..."
            sudo rsync -a --delete deploy/standalone/ .next/standalone/

            rm -rf deploy

            sudo pm2 restart ecosystem.config.js
            sudo pm2 save
